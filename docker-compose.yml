name: gtm-engine

x-backend-env: &backend-env
  ENVIRONMENT: ${ENVIRONMENT:-development}
  DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://gtm:gtm_password@postgres:5432/gtm_engine}
  DATABASE_SYNC_URL: ${DATABASE_SYNC_URL:-postgresql://gtm:gtm_password@postgres:5432/gtm_engine}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
  QDRANT_COLLECTION_PREFIX: ${QDRANT_COLLECTION_PREFIX:-gtm_engine}
  JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
  REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-in-production}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
  FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  ENABLE_PROMETHEUS_METRICS: ${ENABLE_PROMETHEUS_METRICS:-true}
  LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse:3000}
  LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
  LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gtm_engine}
      POSTGRES_USER: ${POSTGRES_USER:-gtm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gtm_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-gtm} -d ${POSTGRES_DB:-gtm_engine}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://localhost:6333/healthz >/dev/null 2>&1 || curl -fsS http://localhost:6333/healthz >/dev/null
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      QDRANT_HOST: qdrant
      INTERNAL_API_PORT: "8000"
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://localhost:8000/health >/dev/null
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      QDRANT_HOST: qdrant
    command:
      - sh
      - -lc
      - celery -A workers.celery_app:celery_app worker --loglevel=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    command:
      - sh
      - -lc
      - celery -A workers.celery_app:celery_app beat --loglevel=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: ${NEXT_TELEMETRY_DISABLED:-1}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost}
      NEXT_PUBLIC_SSE_URL: ${NEXT_PUBLIC_SSE_URL:-http://localhost/events/agent-status}
      API_INTERNAL_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://localhost:3000/ >/dev/null
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  langfuse:
    image: langfuse/langfuse:latest
    restart: unless-stopped
    profiles:
      - observability
    environment:
      DATABASE_URL: ${LANGFUSE_DATABASE_URL:-postgresql://gtm:gtm_password@postgres:5432/langfuse}
      REDIS_URL: ${LANGFUSE_REDIS_URL:-redis://redis:6379/1}
      NEXTAUTH_URL: ${LANGFUSE_NEXTAUTH_URL:-http://localhost:3001}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-change-me-in-production}
      SALT: ${LANGFUSE_SALT:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3000"

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    profiles:
      - observability
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    profiles:
      - observability
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3002:3000"

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
